version: '3.9'
services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Model provider (runs execute here) — Anthropic (Claude), not OpenAI.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Integrations: OAuth + tool proxy via Nango (replaced Klavis).
      NANGO_SECRET_KEY: ${NANGO_SECRET_KEY}
    ports:
      - "3002:3002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Uncomment if you want to limit resources
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.75'
    #       memory: 768M
